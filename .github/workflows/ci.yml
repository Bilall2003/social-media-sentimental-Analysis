name: Sentiment CI
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -t sentiment-app --load .
      - name: Smoke Test Streamlit App
        run: |
          docker run -d -p 8501:8501 --name test-container sentiment-app
          sleep 10
          curl --fail http://localhost:8501/_stcore/health || (docker logs test-container && exit 1)
          docker stop test-container
